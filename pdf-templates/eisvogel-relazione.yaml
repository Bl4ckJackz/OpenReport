---
# Relazione moderna colorata — Eisvogel
# Palette: blu profondo + ambra accent. Più "report aziendale vivace"
# che "tesi accademica sobria". Per progetti, stage, finale, tecniche,
# esperienze, bug post-mortem quando vuoi un PDF che colpisca l'occhio.
#
# Personalizzazione rapida:
# - titlepage-color        → sfondo copertina
# - titlepage-rule-color   → linea/accent copertina
# - linkcolor/urlcolor     → link body
# - table-use-row-colors   → righe alternate
lang: it-IT
geometry: a4paper,margin=2.3cm,top=2.6cm,bottom=2.6cm

# Copertina impattante
titlepage: true
titlepage-color: "1E40AF"              # blu profondo (primary)
titlepage-text-color: "FFFFFF"
titlepage-rule-color: "F59E0B"         # ambra (accent)
titlepage-rule-height: 6
titlepage-background: ""               # opzionale: path immagine sfondo
titlepage-logo: ""                     # opzionale: path logo
logo-width: "90mm"

# Tipografia
fontsize: 11pt
mainfont: "Calibri"
sansfont: "Calibri"
monofont: "Consolas"
linestretch: 1.3

# Indice + liste
toc: true
toc-own-page: true
toc-depth: 3
lof: false
lot: false
numbersections: true
secnumdepth: 3

# Link colorati in body
colorlinks: true
linkcolor: "1E40AF"
urlcolor: "F59E0B"
citecolor: "1E40AF"
toccolor: "1E40AF"

# Code blocks accesi (syntax highlight via listings)
listings: true
listings-disable-line-numbers: false
listings-no-page-break: false
code-block-font-size: "\\small"

# Tabelle a righe alternate (richiede \usepackage{colortbl})
tables: true
table-use-row-colors: true

# Header/footer richiami brand
book: false
header-left: ""
header-center: ""
header-right: "\\thepage"
footer-left: ""
footer-center: ""
footer-right: ""
disable-header-and-footer: false

# Callout colorati e titoli vivaci via header-includes
# (tcolorbox per box evidenziati, titlesec per sezioni colorate)
header-includes:
  - \usepackage{xcolor}
  - \definecolor{primary}{HTML}{1E40AF}
  - \definecolor{accent}{HTML}{F59E0B}
  - \definecolor{muted}{HTML}{64748B}
  - \definecolor{soft}{HTML}{EFF6FF}
  - \usepackage[most]{tcolorbox}
  - \newtcolorbox{nota}{colback=soft,colframe=primary,boxrule=0.8pt,arc=2mm,left=4mm,right=4mm,top=2mm,bottom=2mm}
  - \newtcolorbox{warn}{colback=white,colframe=accent,boxrule=1pt,arc=2mm,left=4mm,right=4mm,top=2mm,bottom=2mm}
  - \usepackage{titlesec}
  - \titleformat{\section}{\Large\bfseries\color{primary}}{\thesection}{0.6em}{}
  - \titleformat{\subsection}{\large\bfseries\color{primary}}{\thesubsection}{0.6em}{}
  - \titleformat{\subsubsection}{\normalsize\bfseries\color{accent}}{\thesubsubsection}{0.6em}{}
---
